openapi: 3.1.0
info:
  title: LoL Arena Stats API
  version: 0.1.0
  description: Contract-first API for a Rust backend that serves arena stats.
servers:
  - url: http://localhost:3001
paths:
  /api/v1/players/search:
    get:
      operationId: searchPlayer
      tags:
        - players
      summary: Resolve a player identity from Riot ID or summoner lookup
      parameters:
        - name: playerName
          in: query
          required: true
          schema:
            type: string
        - name: tagLine
          in: query
          required: false
          schema:
            type: string
        - name: region
          in: query
          required: false
          schema:
            type: string
            default: americas
      responses:
        '200':
          description: Resolved player identity
          content:
            application/json:
              schema:
                $ref: ../schemas/player-search-result.json
        '400':
          description: Invalid player search query
          content:
            application/json:
              schema:
                $ref: ../schemas/api-error.json
        '404':
          description: Player not found
          content:
            application/json:
              schema:
                $ref: ../schemas/api-error.json
  /api/v1/players/{puuid}/profile:
    get:
      operationId: getPlayerProfile
      tags:
        - players
      summary: Fetch Arena-focused profile summary for a player
      parameters:
        - name: puuid
          in: path
          required: true
          schema:
            type: string
        - name: region
          in: query
          required: false
          schema:
            type: string
            default: americas
      responses:
        '200':
          description: Arena profile summary
          content:
            application/json:
              schema:
                $ref: ../schemas/player-profile-summary.json
        '404':
          description: Player profile not found
          content:
            application/json:
              schema:
                $ref: ../schemas/api-error.json
  /health:
    get:
      operationId: getHealth
      tags:
        - system
      summary: Backend health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: ../schemas/health-status.json
  /api/v1/arena/stats:
    get:
      operationId: getArenaStats
      tags:
        - arena
      summary: Fetch aggregated arena stats for a player
      parameters:
        - name: playerName
          in: query
          required: true
          schema:
            type: string
        - name: tagLine
          in: query
          required: false
          schema:
            type: string
        - name: region
          in: query
          required: false
          schema:
            type: string
            default: americas
      responses:
        '200':
          description: Aggregated arena stats snapshot
          content:
            application/json:
              schema:
                $ref: ../schemas/arena-player-stats.json
